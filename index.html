<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FedEx Leave Portal - Login</title>

<style>
body{
  font-family: Arial;
  background:#f4f4f6;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.login-box{
  background:white;
  padding:30px;
  border-radius:10px;
  box-shadow:0 4px 15px rgba(0,0,0,0.2);
  width:320px;
}

h2{
  text-align:center;
  color:#4D148C;
}

input, select{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:6px;
  border:1px solid #ccc;
}

button{
  width:100%;
  margin-top:15px;
  padding:10px;
  background:#FF6600;
  color:white;
  border:none;
  border-radius:6px;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  background:darkorange;
}
</style>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

</head>
<body>

<div class="login-box">
  <h2>Login</h2>

  <select id="loginAs">
    <option value="">Login As</option>
    <option value="Team Leader">Team Leader</option>
    <option value="Manager">Manager</option>
  </select>

  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">

  <button onclick="loginUser()">Login</button>
</div>

<script>
// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyAFedbBDXSZomKX8MQkBfVBRfi6tl0LTcc",
  authDomain: "fedex-attendance-system.firebaseapp.com",
  projectId: "fedex-attendance-system",
  storageBucket: "fedex-attendance-system.firebasestorage.app",
  messagingSenderId: "1049424874301",
  appId: "1:1049424874301:web:f94559159b19ee39c19354"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// LOGIN FUNCTION
async function loginUser(){
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();
  const loginAs = document.getElementById("loginAs").value;

  if(!email || !password || !loginAs){
    alert("Please complete all fields");
    return;
  }

  try{
    const userCred = await auth.signInWithEmailAndPassword(email, password);
    const uid = userCred.user.uid;

    // 🔹 Get role from Firestore
    const userDoc = await db.collection("users").doc(uid).get();

    if(!userDoc.exists){
      alert("User role not found.");
      return;
    }

    const userData = userDoc.data();
    const role = userData.role;

    // Save session
    localStorage.setItem("currentUser", JSON.stringify({
      id: uid,
      name: userData.name,
      email: email,
      role: role
    }));

    // 🔹 ADMIN EMAIL LISTS
    const teamLeaderAdmins = [
      "julanguinto@gmail.com",
      "Trevorbarry.Imatong@iqor.com",
      "Jenileemae.David@iqor.com",
      "Jonie.Kabigting@iqor.com"
    ];

    const managerAdmins = [
      "julanguinto@gmail.com",
      "Trevorbarry.Imatong@iqor.com"
    ];

    // ======================
    // TEAM LEADER FLOW
    // ======================
    if(loginAs === "Team Leader"){

      if(teamLeaderAdmins.includes(email)){
        window.location.href = "admin.html";
        return;
      }

      if(role === "admin"){
        window.location.href = "admin.html";
      }
      else if(role === "employee"){
        window.location.href = "employee.html";
      }
      else{
        alert("Unauthorized role for Team Leader.");
      }
    }

    // ======================
    // MANAGER FLOW
    // ======================
    else if(loginAs === "Manager"){

      if(managerAdmins.includes(email)){
        window.location.href = "manager-admin.html";
        return;
      }

      if(role === "manager-admin"){
        window.location.href = "manager-admin.html";
      }
      else if(role === "manager-employee"){
        window.location.href = "manager-employee.html";
      }
      else{
        alert("Unauthorized role for Manager.");
      }
    }

  } catch(err){
    alert("Login failed: " + err.message);
  }
}
</script>

</body>
</html>

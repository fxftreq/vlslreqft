<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Change Password</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
  --fedex-purple:#4D148C;
  --fedex-orange:#FF6600;
  --border:#d1d5db;
  --danger:#dc2626;
  --success:#16a34a;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial,sans-serif;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(-45deg,#4D148C,#FF6600,#4D148C,#FF6600);
  background-size:400% 400%;
  animation:gradientAnimation 15s ease infinite;
  padding:16px;
}
@keyframes gradientAnimation{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}
.card{
  width:100%;
  max-width:430px;
  background:rgba(255,255,255,.97);
  border-radius:8px;
  box-shadow:0 10px 25px rgba(0,0,0,.18);
  padding:30px 26px;
}
.logo{
  text-align:center;
  margin-bottom:10px;
}
.logo img{
  height:110px;
}
.title{
  text-align:center;
  font-size:24px;
  font-weight:700;
  color:var(--fedex-purple);
  margin-bottom:8px;
}
.subtitle{
  text-align:center;
  color:#555;
  font-size:14px;
  margin-bottom:22px;
  line-height:1.5;
}
label{
  display:block;
  font-size:.9em;
  font-weight:700;
  margin-bottom:6px;
  color:#333;
}
.input-wrap{
  position:relative;
  margin-bottom:16px;
}
input{
  width:100%;
  padding:12px 42px 12px 12px;
  border:1px solid var(--border);
  border-radius:4px;
  font-size:.95em;
}
.input-wrap i{
  position:absolute;
  right:12px;
  top:50%;
  transform:translateY(-50%);
  color:#6b7280;
  cursor:pointer;
}
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:4px;
  background:var(--fedex-purple);
  color:#fff;
  font-weight:700;
  cursor:pointer;
  font-size:15px;
}
button:hover{
  opacity:.95;
}
#error{
  margin-top:12px;
  color:var(--danger);
  font-size:.9em;
  text-align:center;
}
#success{
  margin-top:12px;
  color:var(--success);
  font-size:.95em;
  font-weight:700;
  text-align:center;
}
.note{
  margin-top:14px;
  text-align:center;
  color:#666;
  font-size:12px;
}
</style>
</head>
<body>

<div class="card">
  <div class="logo">
    <img src="fedex.png" alt="FedEx Logo">
  </div>

  <div class="title">Change Password</div>
  <div class="subtitle">
    You are using a temporary password.<br>
    Please create a new password before continuing.
  </div>

  <label for="newPassword">New Password</label>
  <div class="input-wrap">
    <input type="password" id="newPassword" placeholder="Enter new password">
    <i class="fa-solid fa-eye" id="toggleNewPassword"></i>
  </div>

  <label for="confirmPassword">Confirm Password</label>
  <div class="input-wrap">
    <input type="password" id="confirmPassword" placeholder="Confirm new password">
    <i class="fa-solid fa-eye" id="toggleConfirmPassword"></i>
  </div>

  <button id="savePasswordBtn">Update Password</button>

  <div id="error"></div>
  <div id="success"></div>

  <div class="note">
    Use a password you can remember. You will use it for your next login.
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
firebase.initializeApp({
  apiKey: "AIzaSyAFedbBDXSZomKX8MQkBfVBRfi6tl0LTcc",
  authDomain: "fedex-attendance-system.firebaseapp.com",
  projectId: "fedex-attendance-system"
});

const auth = firebase.auth();
const db = firebase.firestore();

const currentUserLocal = JSON.parse(localStorage.getItem("currentUser") || "null");
const errorEl = document.getElementById("error");
const successEl = document.getElementById("success");

function togglePassword(inputId, iconId){
  const input = document.getElementById(inputId);
  const icon = document.getElementById(iconId);

  icon.addEventListener("click", () => {
    if(input.type === "password"){
      input.type = "text";
      icon.classList.replace("fa-eye","fa-eye-slash");
    } else {
      input.type = "password";
      icon.classList.replace("fa-eye-slash","fa-eye");
    }
  });
}

togglePassword("newPassword", "toggleNewPassword");
togglePassword("confirmPassword", "toggleConfirmPassword");

if(!currentUserLocal){
  alert("Please login first.");
  location.href = "index.html";
}

auth.onAuthStateChanged(async (user) => {
  if (!user) {
    alert("Your session expired. Please login again.");
    location.href = "index.html";
  }
});

async function clearForcePasswordChange(email){
  const collections = ["leave_users", "manager_leave_user"];

  for (const col of collections) {
    const snap = await db.collection(col).get();
    const match = snap.docs.find(doc => {
      const data = doc.data() || {};
      return String(data.email || "").toLowerCase() === String(email || "").toLowerCase();
    });

    if (match) {
      await db.collection(col).doc(match.id).update({
        forcePasswordChange: false,
        tempPasswordIssuedAt: firebase.firestore.FieldValue.delete()
      });
    }
  }
}

document.getElementById("savePasswordBtn").addEventListener("click", async () => {
  const newPassword = document.getElementById("newPassword").value.trim();
  const confirmPassword = document.getElementById("confirmPassword").value.trim();

  errorEl.textContent = "";
  successEl.textContent = "";

  if (!newPassword || !confirmPassword) {
    errorEl.textContent = "Please fill out both password fields.";
    return;
  }

  if (newPassword.length < 6) {
    errorEl.textContent = "Password must be at least 6 characters.";
    return;
  }

  if (newPassword !== confirmPassword) {
    errorEl.textContent = "Passwords do not match.";
    return;
  }

  try {
    const user = auth.currentUser;

    if (!user) {
      errorEl.textContent = "No authenticated user found. Please login again.";
      return;
    }

    await user.updatePassword(newPassword);
    await clearForcePasswordChange(user.email);

    const updatedUser = {
      ...currentUserLocal,
      forcePasswordChange: false
    };
    localStorage.setItem("currentUser", JSON.stringify(updatedUser));

    successEl.textContent = "Password updated successfully. Redirecting...";

    setTimeout(() => {
      const role = updatedUser.role;

      if (role === "manager") {
        location.href = "manager-employee.html";
      } else if (role === "team_leader") {
        location.href = "employee.html";
      } else {
        location.href = "index.html";
      }
    }, 1200);

  } catch (err) {
    console.error(err);

    if (err.code === "auth/requires-recent-login") {
      errorEl.textContent = "Please login again using your temporary password, then try again.";
    } else {
      errorEl.textContent = err.message || "Failed to update password.";
    }
  }
});
</script>

</body>
</html>
